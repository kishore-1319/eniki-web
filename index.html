<!DOCTYPE html>
<html>
<head>
    <title>Sample Web Page</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container{
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome</h1>

        <p>This is a sample HTML webpage.</p>

        <img src="https://via.placeholder.com/200" alt="Sample Image">

        <br><br>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>

    <script>
        function showMessage(){
            alert("Hello! Button Clicked");
        }
    </script>

</body>
</html>
